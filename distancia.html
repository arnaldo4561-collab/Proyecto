<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="estilo2.css">
<title>Distancia</title>
</head>

<body>

<h1>Aunque estemos lejos…</h1>

<p>
Sé que estamos a unos <b>4,850 km</b> de distancia.  
Desde Guayaquil hasta Wisconsin Dells. 🌎  

Pero la distancia no me impide  
querer hacer algo bonito para ti 💙  

Porque cuando alguien es especial,  
ni los kilómetros cambian lo que uno siente.
</p>

<button onclick="window.location.href='admiracion.html'">
Continuar ✨
</button>

<div class="music">
<audio src="src/musica1.mp3" autoplay loop></audio>
</div>

<script>
const music = document.querySelector('.music audio');

window.addEventListener('load', () => {
const savedTime = localStorage.getItem('musicTime');
if (savedTime) music.currentTime = savedTime;
music.play();
});

setInterval(()=>{
localStorage.setItem('musicTime', music.currentTime);
},1000);
</script>

</body>
</html>
