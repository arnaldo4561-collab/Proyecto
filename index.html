<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="tipeado.css">
    <title>AldoGay</title>
</head>
<body>
    <h1>Para ti chonera linda</h1>
    <div><h1 class="segundo">Homero basta</h1></div>
    <button onclick="window.location.href='second.html'">tocame uwu</button>

    <div class="music">
        <audio src="src/The Line.mp3#t=60" controls loop autoplay></audio>
    </div>

    <script>
        const music = document.querySelector('.music audio');
        window.addEventListener('load', () => {
            const savedTime = localStorage.getItem('musicTime');
            if (savedTime) {
                music.currentTime = savedTime;
            }
            music.play();
        });

        setInterval(() => {
            localStorage.setItem('musicTime', music.currentTime);
        }, 1000);
    </script>
</body>
</html>
