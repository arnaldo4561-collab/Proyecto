<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="estilo1.css">
<title>Para ti ❤️</title>
</head>

<body>

<h1>Hola corazoncito… ❤️</h1>

<p class="mensaje">
¿Cómo te encuentras hoy?...  
Hice algo pequeño para ti,  
pero lo hice con mucho cariño ✨
</p>

<button onclick="window.location.href='distancia.html'">
Dale click 💌
</button>

<div class="music">
<audio src="src/musica1.mp3" autoplay loop></audio>
</div>

<script>
const music = document.querySelector('.music audio');

window.addEventListener('load', () => {
const savedTime = localStorage.getItem('musicTime');
if (savedTime) music.currentTime = savedTime;
music.play();
});

setInterval(() => {
localStorage.setItem('musicTime', music.currentTime);
},1000);
</script>

</body>
</html>
